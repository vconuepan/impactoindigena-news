name: Deploy Backend to Azure

# The app runs with WEBSITE_RUN_FROM_PACKAGE=1 so Azure mounts the deployed
# zip read-only instead of letting Oryx compress/extract node_modules. Oryx's
# node_modules compression silently dropped the native @napi-rs/canvas module
# (Instagram carousel rendering), so run-from-package preserves the exact
# node_modules built here.
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix server

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/db'

      - name: Build
        run: npm run build --prefix server

      - name: Prune dev dependencies
        run: npm prune --prefix server --production

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383  # v3.0.8
        with:
          app-name: impactoindigena-news-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: server/
