name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/deploy-azure-frontend.yml'

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # Build in the runner (not Oryx) so the prerender plugin's bundled
      # Chrome has the system libraries it needs. Oryx's build container
      # lacks libnspr4.so and fails the prerender step.
      - name: Install dependencies
        run: npm ci --prefix client

      # The backend is locked behind the SWA linked-backend proxy (Easy Auth),
      # so it only accepts traffic through the SWA. Runtime calls therefore use
      # VITE_API_URL="" (same-origin /api → proxied), which also keeps auth
      # cookies same-origin. The prerender step can't reach the backend
      # directly, so it fetches slugs through the SWA public proxy URL via
      # PRERENDER_API_URL.
      - name: Build (with prerendering)
        run: npm run build --prefix client
        env:
          VITE_API_URL: ""
          PRERENDER_API_URL: "https://calm-pebble-039bfb80f.7.azurestaticapps.net"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          output_location: ""
          skip_app_build: true
